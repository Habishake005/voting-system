<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VoteApp — Cast Your Vote</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <nav class="topnav">
    <div class="nav-left">
      <div class="logo-icon small">V</div>
      <span class="nav-brand">VoteApp</span>
    </div>
    <div class="nav-right">
      <span id="nav-user" class="nav-user"></span>
      <a href="results.html" class="btn-ghost">Results</a>
      <button class="btn-ghost" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="page-content">
    <div class="page-header">
      <h2>Cast Your Vote</h2>
      <p>Select one candidate and submit your vote</p>
    </div>

    <div id="already-voted" class="alert alert-info hidden">
      You have already voted in this election. View the live results below.
    </div>

    <div id="candidates" class="candidates-grid"></div>

    <div class="vote-action">
      <button class="btn-primary wide" id="vote-btn" onclick="submitVote()" disabled>
        Submit Vote
      </button>
      <a href="results.html" class="btn-ghost">View Live Results →</a>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
